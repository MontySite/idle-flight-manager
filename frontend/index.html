<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idle Flight Manager</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">&#9992;</span>
      <span class="title">IDLE FLIGHT MANAGER</span>
    </div>

    <div class="mode-pill" id="mode-pill" title="Click to view game mode">Simplified</div>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">CASH</span>
        <span class="stat-value money" id="stat-money">$0</span>
      </div>
      <div class="stat">
        <span class="stat-label">INCOME / S</span>
        <span class="stat-value income" id="stat-income">$0</span>
      </div>
      <div class="stat">
        <span class="stat-label">ROUTES</span>
        <span class="stat-value" id="stat-routes">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">FLEET</span>
        <span class="stat-value" id="stat-fleet">0</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="btn-hangar">Hangar</button>
      <button class="btn" id="btn-routes">Routes</button>
      <button class="btn" id="btn-events">Events <span class="badge" id="badge-events" hidden>0</span></button>
      <button class="btn" id="btn-stats">Stats</button>
      <button class="btn ghost" id="btn-save">Save</button>
    </div>
  </header>

  <main id="map"></main>

  <!-- Floating side panel (left) -->
  <aside class="panel" id="side-panel">
    <div class="panel-header">
      <h2 id="panel-title">Welcome, CEO</h2>
      <button class="icon-btn" id="panel-close" aria-label="close">&times;</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>

  <!-- Toast / log -->
  <div class="toast-stack" id="toasts"></div>

  <!-- Modal -->
  <div class="modal-backdrop hidden" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Title</h3>
        <button class="icon-btn" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="data/planes.js"></script>
  <script src="data/econ.js"></script>
  <script src="app.js"></script>
</body>
</html>
